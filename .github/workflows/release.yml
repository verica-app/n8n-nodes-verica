name: Release (npm, with provenance)

# Lives in the PUBLIC repo verica-app/n8n-nodes-verica as
# .github/workflows/release.yml. Provenance is required for n8n verification
# (mandatory since May 2026) and only works from a public repo.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          [ "$TAG" = "$PKG" ] || { echo "tag $TAG != version $PKG" >&2; exit 1; }
      - run: npm test
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
